<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tournament Floor Matrix [v2.4.0]</title>
<style>
:root {
  --bg-main: #0a0e17;          
  --bg-card: #121826;          
  --bg-panel: #0e1320;         
  --border-color: #222f4d;     
  --text-main: #f1f5f9;        
  --text-muted: #64748b;       
  --color-active: #eab308;     
  --color-seat-occ: #f59e0b;  
  --poker-green-start: #064e3b;
  --poker-green-end: #022c22;
  --status-ok-bg: rgba(16, 185, 129, 0.12);
  --status-ok-text: #10b981;
  --status-warn-bg: rgba(234, 179, 8, 0.12);
  --status-warn-text: #facc15;
  --status-low-bg: rgba(239, 68, 68, 0.12);
  --status-low-text: #f87171;
  --panel-glow: rgba(59, 130, 246, 0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
  background: radial-gradient(circle at 50% 30%, #111a2e 0%, var(--bg-main) 100%);
  background-color: var(--bg-main);
  color: var(--text-main); 
  min-height: 100vh;
  padding: calc(0.8rem + env(safe-area-inset-top)) calc(0.8rem + env(safe-area-inset-right)) calc(0.8rem + env(safe-area-inset-bottom)) calc(0.8rem + env(safe-area-inset-left));
  letter-spacing: 0.02em;
  overflow-x: hidden;
  overflow-y: auto;
}

.container { max-width: 1200px; margin: 0 auto; width: 100%; }

/* 👑 顶部标题栏 */
.top-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  border-bottom: 1px solid rgba(34, 47, 77, 0.4);
  padding-bottom: 8px;
}
.title-area { display: flex; flex-direction: column; gap: 2px; }
.top-header h1 { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
.version-tag {
  font-size: 9px;
  font-weight: 700;
  color: var(--color-active);
  background: rgba(234, 179, 8, 0.06);
  border: 1px solid rgba(234, 179, 8, 0.15);
  padding: 1px 6px;
  border-radius: 4px;
  width: fit-content;
}

/* 🧹 极其安全的微缩清空按钮 */
.danger-zone-trigger {
  background: rgba(239, 68, 68, 0.05);
  border: 1px solid rgba(239, 68, 68, 0.2);
  color: #f87171;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s;
}
.danger-zone-trigger:hover { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.4); }

/* 🎛️ 核心控制区（绝对置顶） */
.floor-config-panel { 
  background: linear-gradient(180deg, var(--bg-panel) 0%, #0a0e17 100%); 
  border: 1px solid var(--border-color); 
  border-radius: 14px; 
  padding: 0.8rem 1rem; 
  margin-bottom: 0.8rem; 
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
}

.config-item { display: flex; flex-direction: column; gap: 6px; }
.config-title { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.03em; }

.stepper-container { display: flex; align-items: center; gap: 4px; background: #070a12; padding: 2px; border-radius: 8px; border: 1px solid #1e293b; max-width: 150px; }
.step-btn { background: linear-gradient(180deg, #222f4d 0%, #161f33 100%); border: 1px solid #2e3f66; color: #fff; font-size: 14px; font-weight: 800; width: 34px; height: 34px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s ease; }
.step-btn:active { background: #121929; transform: scale(0.95); }
.floor-input-box { background: #0d1321; border: 1px solid var(--border-color); color: var(--color-active); font-size: 14px; font-weight: 800; width: 45px; height: 34px; text-align: center; border-radius: 6px; outline: none; }

/* 📊 数据看板（下移并横向微缩紧凑处理） */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 0.8rem; width: 100%; }
.stat { 
  background: linear-gradient(145deg, #111827 0%, var(--bg-card) 100%); 
  border: 1px solid var(--border-color); 
  border-radius: 10px; 
  padding: 6px 8px; 
  font-size: 9px; 
  font-weight: 700; 
  text-transform: uppercase; 
  color: var(--text-muted); 
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: all 0.3s ease;
}
.stat b { color: var(--color-active); font-weight: 900; font-size: 16px; display: block; margin-top: 1px; }

/* 🚨 高危卡片红光低频呼吸闪烁 */
.stat.pulse-alert {
  border-color: rgba(239, 68, 68, 0.4);
  animation: card-alert-glow 2s infinite ease-in-out;
}
.stat.pulse-alert b { color: var(--status-low-text); text-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }

@keyframes card-alert-glow {
  0%, 100% { background: linear-gradient(145deg, #111827 0%, var(--bg-card) 100%); border-color: rgba(239, 68, 68, 0.3); }
  50% { background: linear-gradient(145deg, #251218 0%, #141017 100%); border-color: rgba(239, 68, 68, 0.6); box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
}

/* 🧭 导航切换栏 */
.nav-bar { display: flex; margin-bottom: 0.8rem; }
.tabs { display: flex; background: #090d16; padding: 2px; border-radius: 10px; border: 1px solid var(--border-color); width: 100%; }
.tab { flex: 1; text-align: center; padding: 8px 0; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; color: var(--text-muted); background: none; border: none; border-radius: 7px; transition: all .15s ease; }
.tab.active { color: #fff; background: linear-gradient(135deg, #1e293b 0%, #111827 100%); border: 1px solid var(--color-active); box-shadow: 0 3px 6px rgba(234, 179, 8, 0.1); }

/* 🃏 核心内容区 */
.panel { display: none; width: 100%; animation: fadeIn 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
.panel.active { display: block; }

.tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; width: 100%; }
@media (min-width: 768px) { .tables-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; } }

.table-card {
  background: linear-gradient(145deg, #131a28 0%, var(--bg-card) 100%); border: 1px solid var(--border-color); border-radius: 12px;
  padding: 14px 6px 10px; cursor: pointer; text-align: center; position: relative;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: all 0.15s ease;
}
.table-card:hover { border-color: var(--color-active); }
.table-card.selected { border: 2px solid var(--color-active); box-shadow: 0 0 12px rgba(234, 179, 8, 0.2); background: linear-gradient(145deg, #182033 0%, #121826 100%); }

/* 🟢 健康桌子绿光渐变暗影效果 */
.table-card.st-ok-filled { border-color: rgba(16, 185, 129, 0.25); box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.04), 0 4px 8px rgba(0,0,0,0.2); }
.table-card.st-warn { border-color: rgba(234, 179, 8, 0.3); }
.table-card.st-low  { border-color: rgba(239, 68, 68, 0.35); }

.t-header-row { display: flex; align-items: center; justify-content: center; gap: 4px; }
.t-num { font-size: 12px; color: #fff; font-weight: 700; }
.edit-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 10px; opacity: 0.3; padding: 2px; }
.edit-btn:hover { opacity: 1; }

.t-cnt { font-size: 28px; font-weight: 900; color: var(--color-active); line-height: 1.1; margin: 1px 0; }
.t-sub { font-size: 9px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

.mini-seats { display: flex; flex-wrap: wrap; justify-content: center; gap: 3px; margin-top: 6px; max-width: 90px; margin-left: auto; margin-right: auto; }
.md { width: 4px; height: 4px; border-radius: 50%; }
.md-occ { background: var(--color-active); box-shadow: 0 0 3px var(--color-active); }
.md-empty { background: #222f4d; }

.badge { position: absolute; top: 4px; right: 4px; font-size: 7px; padding: 1px 4px; border-radius: 4px; font-weight: 800; letter-spacing: 0.02em; }
.bg-ok   { background: var(--status-ok-bg); color: var(--status-ok-text); }
.bg-warn { background: var(--status-warn-bg); color: var(--status-warn-text); }
.bg-low  { background: var(--status-low-bg); color: var(--status-low-text); }

/* 🛠️ 马蹄形排座位细化区域 */
.detail-wrap { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: center; margin-top: 0.4rem; width: 100%;}
@media (min-width: 768px) { .detail-wrap { flex-wrap: nowrap; } }

.felt-container { width: 100%; max-width: 350px; display: flex; justify-content: center; align-items: center; }
.seat-panel { flex: 1; min-width: 300px; background: var(--bg-panel); padding: 1rem; border-radius: 14px; border: 1px solid var(--border-color); box-shadow: 0 8px 25px rgba(0,0,0,0.35); }
.rename-section { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
.rename-input { background: #070a12; border: 1px solid var(--border-color); border-radius: 6px; color: #fff; padding: 6px 10px; font-size: 13px; font-weight: 700; width: 110px; outline: none; }
.rename-input:focus { border-color: var(--color-active); }
.rename-confirm { background: linear-gradient(180deg, #222f4d 0%, #161f33 100%); border: 1px solid #2e3f66; color: white; padding: 6px 12px; font-size: 11px; font-weight: 700; border-radius: 6px; cursor: pointer; }

.seat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 1rem; }
.seat-btn { border-radius: 10px; height: 46px; font-size: 13px; text-align: center; cursor: pointer; border: 1px solid var(--border-color); font-weight: 900; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.05s ease; }
.seat-btn:active { transform: scale(0.96); }
.sb-occ   { background: linear-gradient(135deg, rgba(234, 179, 8, 0.2) 0%, rgba(245, 158, 11, 0.1) 100%); color: #fff; border: 2px solid var(--color-seat-occ); }
.sb-empty { background: #070a12; color: var(--text-muted); border-color: var(--border-color); box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }

.break-btn { font-size: 11px; padding: 6px 12px; cursor: pointer; background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); border-radius: 6px; color: #f87171; font-weight: 700; }
.move-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 14px; font-size: 11px; width: 100%; }
.exec-btn { font-size: 11px; padding: 5px 12px; cursor: pointer; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border: 1px solid #eab308; border-radius: 6px; color: var(--color-active); font-weight: 700; }

/* 📊 密度图与建议区 */
.bar-row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; align-items: end; height: 160px; margin-bottom: 10px; background: #080c14; padding: 12px 6px; border-radius: 12px; border: 1px solid var(--border-color); width: 100%; position: relative; box-shadow: inset 0 3px 8px rgba(0,0,0,0.5); }
@media (min-width: 640px) { .bar-row { grid-template-columns: repeat(auto-fit, minmax(1px, 1fr)); height: 130px; } }
.bar-col { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; }
.bar-col.vacant-mode { opacity: 0.15; }
.bar-track { width: 100%; flex: 1; display: flex; align-items: flex-end; justify-content: center; }
.bar { border-radius: 3px 3px 0 0; min-height: 2px; width: 70%; transition: height .2s ease; }
.bar.low { background: var(--status-low-text); box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); animation: pulse-red 1.4s infinite ease-in-out; }
.bar.ok   { background: var(--status-ok-text); opacity: .85; }
.bar.warn { background: var(--status-warn-text); opacity: .95; }
.bar-lbl { font-size: 8px; color: #fff; font-weight: 800; margin-bottom: 2px; }
.bar-val { font-size: 9px; color: var(--color-active); font-weight: 900; margin-top: 2px; }
.bar-val.crit-text { color: var(--status-low-text); }

@keyframes pulse-red { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

.sec-title { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--text-main); margin-bottom: 0.4rem; margin-top: 1rem; letter-spacing: 0.02em; }
.detail-select { font-size: 13px; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: #070a12; color: var(--text-main); margin-bottom: 0.8rem; cursor: pointer; font-weight: 700; width: 100%; max-width: 300px; }
.alert-box { margin-top: 0.8rem; padding: 10px; background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.18); border-radius: 8px; font-size: 11px; color: #f87171; display: flex; align-items: center; justify-content: space-between; gap: 6px; width: 100%; }
.info-box { padding: 8px 0; font-size: 12px; color: var(--status-ok-text); font-weight: 700; text-transform: uppercase; width: 100%; }

#toast-notification {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--color-active);
  color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 700;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5); z-index: 9999; opacity: 0;
  transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s linear;
}
#toast-notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">

  <!-- 👑 顶部标题栏 + 隐蔽式双重安全清空按钮 -->
  <div class="top-header">
    <div class="title-area">
      <h1>🃏 FLOOR MATRIX</h1>
      <div class="version-tag">v2.4.0 (Controls Top & Persistence)</div>
    </div>
    <button class="danger-zone-trigger" onclick="clearAllPlayers()">🧹 Reset</button>
  </div>

  <!-- 🎛️ 核心控制区（布局绝对置顶调换） -->
  <div class="floor-config-panel">
    <div class="config-item">
      <div class="config-title">Active Rings (1-20)</div>
      <div class="stepper-container">
        <button class="step-btn" onclick="stepActiveFloor(-1)">—</button>
        <input type="number" id="floor-input" class="floor-input-box" min="1" max="20" value="10" onchange="directTypeFloorCount(this.value)">
        <button class="step-btn" onclick="stepActiveFloor(1)">+</button>
      </div>
    </div>
    <div class="config-item">
      <div class="config-title">Max Seats (2-10)</div>
      <div class="stepper-container">
        <button class="step-btn" onclick="stepMaxSeats(-1)">—</button>
        <input type="number" id="seats-input" class="floor-input-box" min="2" max="10" value="9" onchange="directTypeSeatsCount(this.value)">
        <button class="step-btn" onclick="stepMaxSeats(1)">+</button>
      </div>
    </div>
  </div>

  <!-- 📊 数据看板（下移，体积轻量横向一体化） -->
  <div class="stats-row">
    <div class="stat" id="card-total">Total <b id="s-total">0</b></div>
    <div class="stat" id="card-tables">Rings <b id="s-tables">0</b></div>
    <div class="stat" id="card-spread">Spread <b id="s-spread">0</b></div>
    <div class="stat" id="card-alerts">Alerts <b id="s-needs">0</b></div>
  </div>

  <!-- 🧭 选项卡导航 -->
  <div class="nav-bar">
    <div class="tabs">
      <button class="tab active" id="btn-overview" onclick="showTab('overview')">Matrix Grid</button>
      <button class="tab" id="btn-detail" onclick="showTab('detail')">Configurator</button>
      <button class="tab" id="btn-balance" onclick="showTab('balance')">Engine</button>
    </div>
  </div>

  <!-- 🃏 矩阵网格面板 -->
  <div id="panel-overview" class="panel active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;font-size:9px;color:var(--text-muted);font-weight:600;">
      <span>STATE TRACKER ACTIVE</span>
      <div style="display:flex;gap:4px">
        <span class="badge bg-ok" style="position:static">✓ OPTIMAL</span>
        <span class="badge bg-warn" style="position:static">⚠️ UNEVEN</span>
        <span class="badge bg-low" style="position:static">! SHORTHANDED</span>
      </div>
    </div>
    <div class="tables-grid" id="tables-grid"></div>
  </div>

  <!-- 🛠️ 单桌排座面板 -->
  <div id="panel-detail" class="panel">
    <select class="detail-select" id="detail-sel" onchange="dropdownTableSelect(+this.value)"></select>
    <div id="detail-body"></div>
  </div>

  <!-- 📊 平衡引擎面板 -->
  <div id="panel-balance" class="panel">
    <div class="sec-title" style="margin-top:0">Seating Density Curve</div>
    <div class="bar-row" id="bar-chart"></div>
    <div class="sec-title">TDA Balancing Directives</div>
    <div id="suggestions"></div>
    <div id="break-wrap" style="display:none">
      <div class="sec-title" style="color:#f87171">High Risk Consolidation Mandates</div>
      <div id="break-list"></div>
    </div>
  </div>

</div>

<div id="toast-notification">State Saved</div>

<script>
let globalMaxPlayers = 9; 
const IDEAL_MIN = 6, IDEAL_MAX = 8;
let tables = [], selectedTable = 1, activeFloorSize = 10;

// 💾 LOCALSTORAGE 持久化保存机制
function saveStateToLocalStorage() {
  const stateData = {
    globalMaxPlayers: globalMaxPlayers,
    activeFloorSize: activeFloorSize,
    selectedTable: selectedTable,
    tables: tables.map(t => ({
      id: t.id,
      tableName: t.tableName,
      active: t.active,
      seats: t.seats.map(s => ({ id: s.id, occ: s.occ }))
    }))
  };
  localStorage.setItem('poker_floor_matrix_state', JSON.stringify(stateData));
}

// 💾 LOCALSTORAGE 持久化读取机制
function loadStateFromLocalStorage() {
  const saved = localStorage.getItem('poker_floor_matrix_state');
  if (!saved) return false;
  try {
    const parsed = JSON.parse(saved);
    globalMaxPlayers = parsed.globalMaxPlayers || 9;
    activeFloorSize = parsed.activeFloorSize || 10;
    selectedTable = parsed.selectedTable || 1;
    tables = parsed.tables;
    return true;
  } catch (e) {
    console.error("Error reading storage state", e);
    return false;
  }
}

// 🛑 浏览器物理防误触拦截（刷新或退出时弹窗）
window.addEventListener('beforeunload', function (e) {
  if (getTotal() > 0) {
    e.preventDefault();
    e.returnValue = 'Warning: Active live tournament field records are loaded. Are you sure you want to exit?';
  }
});

function initTables() {
  const isLoaded = loadStateFromLocalStorage();
  if (isLoaded) {
    // Sync check for size array compatibility
    return;
  }

  tables = Array.from({length: 20}, (_, i) => {
    let seatsArray = [];
    for(let s = 0; s < globalMaxPlayers; s++) {
      seatsArray.push({ id: s + 1, occ: false });
    }
    return {
      id: i + 1, 
      tableName: `${i + 1}`, 
      active: i < activeFloorSize, 
      seats: seatsArray
    };
  });
}

function syncTableSeatsCapacity() {
  tables.forEach(t => {
    if (t.seats.length !== globalMaxPlayers) {
      let updatedSeats = [];
      for (let s = 0; s < globalMaxPlayers; s++) {
        const oldSeat = t.seats.find(ox => ox.id === (s + 1));
        updatedSeats.push({ id: s + 1, occ: oldSeat ? oldSeat.occ : false });
      }
      t.seats = updatedSeats;
    }
  });
}

function showToast(message) {
  const toast = document.getElementById('toast-notification');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); }, 1800);
}

function clearAllPlayers() {
  if (confirm("⚠️ DOUBLE SECURITY CHECK:\nAre you absolutely sure you want to completely flush and clear all player rosters on the field? This cannot be undone.")) {
    tables.forEach(t => t.seats.forEach(s => s.occ = false));
    saveStateToLocalStorage();
    renderGrid();
    showToast("🧹 Storage & seats cleared successfully");
    if (document.getElementById('panel-detail').classList.contains('active')) {
      populateSelect();
      if(selectedTable) showDetail(selectedTable);
    } else if (document.getElementById('panel-balance').classList.contains('active')) {
      renderBalance();
    }
  }
}

function stepActiveFloor(delta) {
  let target = activeFloorSize + delta;
  if(target < 1) target = 1;
  if(target > 20) target = 20;
  applyFloorSizeChange(target);
}
function directTypeFloorCount(val) {
  let target = parseInt(val, 10);
  if(isNaN(target) || target < 1) target = 1;
  if(target > 20) target = 20;
  applyFloorSizeChange(target);
}
function applyFloorSizeChange(targetCount) {
  activeFloorSize = targetCount;
  document.getElementById('floor-input').value = activeFloorSize;
  
  tables.forEach((t, i) => {
    t.active = (i < activeFloorSize);
    if (!t.active) t.seats.forEach(s => s.occ = false);
  });

  const currentActiveTables = getActive();
  if (currentActiveTables.length > 0) {
    const stillExists = currentActiveTables.find(t => t.id === selectedTable);
    if (!stillExists) selectedTable = currentActiveTables[0].id;
  } else { selectedTable = null; }

  saveStateToLocalStorage();
  renderGrid();
  if (document.getElementById('panel-detail').classList.contains('active')) {
    populateSelect();
    if(selectedTable) showDetail(selectedTable);
  }
}

function stepMaxSeats(delta) {
  let target = globalMaxPlayers + delta;
  if(target < 2) target = 2;
  if(target > 10) target = 10;
  applyMaxSeatsChange(target);
}
function directTypeSeatsCount(val) {
  let target = parseInt(val, 10);
  if(isNaN(target) || target < 2) target = 2;
  if(target > 10) target = 10;
  applyMaxSeatsChange(target);
}
function applyMaxSeatsChange(targetSeats) {
  const violationTable = getActive().find(t => getCount(t) > targetSeats);
  if (violationTable) {
    alert(`⚠️ Constraint Error: Table ${violationTable.tableName} currently has ${getCount(violationTable)} players active, which violates your target limit of ${targetSeats}.`);
    document.getElementById('seats-input').value = globalMaxPlayers;
    return;
  }

  globalMaxPlayers = targetSeats;
  document.getElementById('seats-input').value = globalMaxPlayers;
  
  syncTableSeatsCapacity();
  saveStateToLocalStorage();
  renderGrid();
  showToast(`⚙️ Config saved: ${globalMaxPlayers} Max Seats`);
  
  if (document.getElementById('panel-detail').classList.contains('active')) {
    populateSelect();
    if(selectedTable) showDetail(selectedTable);
  } else if (document.getElementById('panel-balance').classList.contains('active')) {
    renderBalance();
  }
}

const getActive = () => tables.filter(t => t.active);
const getCount  = t  => t.seats.filter(s => s.occ).length;
const getEmpty  = t  => t.seats.filter(s => !s.occ);
const getTotal  = () => tables.reduce((a,t) => a+getCount(t), 0);

function status(t){ 
  const c=getCount(t); 
  if (c === 0) return 'ok'; 
  if (c <= 3) return 'low'; 
  if (c < IDEAL_MIN || c > IDEAL_MAX) return 'warn'; 
  return 'ok'; 
}

function updateStats() {
  const at=getActive();
  const total = getTotal();
  const alertCount = at.filter(t=>status(t)!=='ok' && getCount(t)>0).length;
  
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-tables').textContent = at.length;
  
  const alertsCard = document.getElementById('card-alerts');
  document.getElementById('s-needs').textContent = alertCount;
  if (alertCount > 0) { alertsCard.classList.add('pulse-alert'); } else { alertsCard.classList.remove('pulse-alert'); }

  const scoringCounts = at.filter(t => getCount(t) > 0).map(t => getCount(t));
  const spreadEl = document.getElementById('s-spread');
  const spreadCard = document.getElementById('card-spread');
  
  if(scoringCounts.length <= 1) {
    spreadEl.textContent = "0";
    spreadCard.classList.remove('pulse-alert');
  } else {
    const max = Math.max(...scoringCounts);
    const min = Math.min(...scoringCounts);
    const spread = max - min;
    spreadEl.textContent = spread;
    if(spread >= 3) { spreadCard.classList.add('pulse-alert'); } else { spreadCard.classList.remove('pulse-alert'); }
  }
}

function renameTable(tid, event) {
  if (event) event.stopPropagation();
  const t = tables.find(x => x.id === tid);
  if (!t) return;
  const newName = prompt(`Enter custom identifier tag for Table ${t.tableName}:`, t.tableName);
  if (newName !== null && newName.trim() !== "") {
    t.tableName = newName.trim();
    saveStateToLocalStorage();
    renderGrid();
    if(selectedTable === tid) showDetail(tid);
  }
}

function submitRename(tid) {
  const input = document.getElementById(`rename-input-${tid}`);
  const t = tables.find(x => x.id === tid);
  if (t && input && input.value.trim() !== "") {
    t.tableName = input.value.trim();
    saveStateToLocalStorage();
    renderGrid();
    showDetail(tid);
  }
}

function dropdownTableSelect(tid) {
  selectedTable = tid;
  saveStateToLocalStorage();
  showDetail(tid);
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('tables-grid');
  g.innerHTML='';
  
  const activeTables = getActive();
  if (activeTables.length === 0) {
    g.innerHTML = `<div class="info-box" style="color:var(--text-muted); text-align:center; padding: 2rem;">No active rings allocated. Use indicators above to build the matrix.</div>`;
    updateStats();
    return;
  }

  activeTables.forEach(t=>{
    const c=getCount(t), st=status(t);
    const d=document.createElement('div');
    const hasPlayers = c > 0;
    
    let stateClass = '';
    if (hasPlayers) {
      if (st === 'warn') stateClass = ' st-warn';
      else if (st === 'low') stateClass = ' st-low';
      else stateClass = ' st-ok-filled'; // 🟢 加入健康环境绿光类
    }
    
    d.className='table-card' + stateClass + (selectedTable===t.id?' selected':'');
    d.onclick=()=>{ 
      selectedTable=t.id; 
      saveStateToLocalStorage();
      renderGrid(); 
      showTab('detail'); 
      showDetail(t.id); 
    };
    
    const bCls=(!hasPlayers || st==='ok')?'bg-ok':st==='warn'?'bg-warn':'bg-low';
    const bTxt=!hasPlayers?'VACANT':(st==='ok'?'✓ OPTIMAL':st==='warn'?'⚠️ UNEVEN':'! SHORTHANDED');
    const pDots = t.seats.map(s => `<div class="md ${s.occ?'md-occ':'md-empty'}"></div>`).join('');
    
    d.innerHTML=`<span class="badge ${bCls}">${bTxt}</span>
      <div class="t-header-row">
        <div class="t-num">Table ${t.tableName}</div>
        <button class="edit-btn" onclick="renameTable(${t.id}, event)">✏️</button>
      </div>
      <div class="t-cnt">${c}</div>
      <div class="t-sub">/ ${globalMaxPlayers} Max</div>
      <div class="mini-seats">${pDots}</div>`;
    g.appendChild(d);
  });
  updateStats();
}

function feltSVG(t) {
  const W=360, H=240, cx=180, cy=125, rx=110, ry=65, sR=14; 
  let seats='';
  
  seats += `<g>
    <rect x="${cx - 26}" y="${cy - ry - 4}" width="52" height="20" rx="5" fill="#0e1320" stroke="#10b981" stroke-width="1.5"/>
    <text x="${cx}" y="${cy - ry + 6}" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#10b981" font-weight="900">DEALER</text>
  </g>`;

  const totalSeats = t.seats.length;
  t.seats.forEach((s, i) => {
    let angleOffset;
    if (totalSeats === 1) {
      angleOffset = 115 * Math.PI / 180;
    } else {
      angleOffset = (-50 + (280 / (totalSeats - 1)) * i) * Math.PI / 180;
    }
    
    const sx=(cx+(rx+25)*Math.cos(angleOffset)).toFixed(1);
    const sy=(cy+(ry+24)*Math.sin(angleOffset)).toFixed(1);
    
    let fill = s.occ ? '#eab308' : '#121826';
    let stroke = s.occ ? '#facc15' : '#222f4d';
    let tc = s.occ ? '#000' : '#64748b';
    
    seats+=`<g style="cursor:pointer" onclick="toggleSeat(${t.id},${s.id})">
      <circle cx="${sx}" cy="${sy}" r="${sR}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
      <text x="${sx}" y="${sy}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="${tc}" font-weight="900">${s.id}</text>
    </g>`;
  });
  
  const c=getCount(t);
  return `<svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" style="filter:drop-shadow(0 6px 15px rgba(0,0,0,.4))">
    <defs><radialGradient id="fg${t.id}" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--poker-green-start)"/><stop offset="100%" stop-color="var(--poker-green-end)"/>
    </radialGradient></defs>
    <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="url(#fg${t.id})" stroke="#022c22" stroke-width="5"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="15" fill="#fff" font-weight="800">TABLE ${t.tableName}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)" font-weight="700">${c} / ${globalMaxPlayers} SEATS</text>
    ${seats}
  </svg>`;
}

function showDetail(tid){
  selectedTable=tid;
  const t=tables.find(x=>x.id===tid);
  if(!t || !t.active) return;
  const c=getCount(t), st=status(t);
  
  const stLabel=c===0?`<span style="color:var(--text-muted)">Unoccupied Ring</span>`:
    st==='ok'?`<span style="color:var(--status-ok-text)">Optimal Stability (TDA Compliant)</span>`:
    st==='warn'?`<span style="color:var(--status-warn-text)">Asymmetric Imbalance Profile</span>`:
    `<span style="color:var(--status-low-text)">Shorthanded Vulnerability</span>`;
    
  const seatBtns=t.seats.map(s=>{
    let cls = s.occ ? 'sb-occ' : 'sb-empty';
    return`<div class="seat-btn ${cls}" onclick="toggleSeat(${t.id},${s.id})">
      <span>SEAT ${s.id}</span>
    </div>`;
  }).join('');
  
  const breakBtnHtml = (c>0 && c<=3) ? `<div class="alert-box"><span>⚠️ Short Field Warning. Relocate players immediately.</span><button class="break-btn" onclick="breakTable(${tid})">Break Table</button></div>` : '';
  
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-wrap">
      <div class="felt-container">
        ${feltSVG(t)}
      </div>
      <div class="seat-panel">
        <div style="font-size: 18px; font-weight: 800; margin-bottom: 4px; color: var(--color-active);">Roster: Table ${t.tableName}</div>
        <div class="rename-section">
          <input type="text" id="rename-input-${t.id}" class="rename-input" value="${t.tableName}">
          <button class="rename-confirm" onclick="submitRename(${t.id})">Rename</button>
        </div>
        <div style="font-size:10px;font-weight:600;margin-bottom:0.4rem">Diagnostics: ${stLabel}</div>
        <div class="seat-grid">${seatBtns}</div>
        ${breakBtnHtml}
      </div>
    </div>`;
  document.getElementById('detail-sel').value=tid;
}

function toggleSeat(tid,sid){
  const t = tables.find(x=>x.id===tid);
  const seat = t.seats.find(s=>s.id===sid);
  seat.occ = !seat.occ;
  saveStateToLocalStorage();
  renderGrid();
  if(selectedTable===tid) showDetail(tid);
}

function breakTable(tid){
  const t=tables.find(x=>x.id===tid);
  const name=t.tableName;
  const players=getCount(t);
  const actives=getActive().filter(x=>x.id!==tid && getCount(x) > 0);
  
  for(let i=0;i<players;i++){
    const target=actives.slice().sort((a,b)=>getCount(a)-getCount(b))[0];
    if(!target) break;
    const empty=getEmpty(target);
    if(empty.length) empty[0].occ=true;
  }
  t.seats.forEach(s=>s.occ=false);
  saveStateToLocalStorage();
  renderGrid();
  showToast(`🚨 Broken & reallocated Table ${name}`);
  if(selectedTable) showDetail(selectedTable);
}

function executeMove(fromId, toId){
  const from = tables.find(t => t.id === fromId);
  const to = tables.find(t => t.id === toId);
  const occupiedSeats = from.seats.filter(s => s.occ);
  const emptySeats = getEmpty(to);
  
  if(occupiedSeats.length > 0 && emptySeats.length > 0) {
    occupiedSeats[occupiedSeats.length - 1].occ = false;
    emptySeats[0].occ = true;
    saveStateToLocalStorage();
    showToast(`🔄 Reallocated: T-${from.tableName} → T-${to.tableName}`);
  }
  renderGrid();
  renderBalance();
  if(selectedTable === fromId || selectedTable === toId) showDetail(selectedTable);
}

function renderBalance(){
  const at=getActive();
  if (at.length === 0) return;
  
  document.getElementById('bar-chart').innerHTML=at.map(t=>{
    const c=getCount(t), st=status(t);
    const hPct = Math.round((c / globalMaxPlayers) * 100); 
    
    const isVacant = c === 0;
    const isCritical = c > 0 && c <= 3;
    
    const colClass = isVacant ? 'bar-col vacant-mode' : 'bar-col';
    const valClass = isCritical ? 'bar-val crit-text' : 'bar-val';
    
    return `
      <div class="${colClass}">
        <div class="bar-lbl">${t.tableName}</div>
        <div class="bar-track">
          <div class="bar ${st}" style="height: calc(${hPct}% + 2px);"></div>
        </div>
        <div class="${valClass}">${c}P</div>
      </div>
    `;
  }).join('');

  const scoringTables = at.filter(t => getCount(t) > 0);
  let sugg = [];
  
  if(scoringTables.length > 1) {
    const sortedMax = [...scoringTables].sort((a,b) => getCount(b) - getCount(a)); 
    const sortedMin = [...scoringTables].sort((a,b) => getCount(a) - getCount(b)); 
    let i = 0, j = 0;
    while(i < sortedMax.length && j < sortedMin.length) {
      const topT = sortedMax[i], botT = sortedMin[j];
      if(topT.id !== botT.id && (getCount(topT) - getCount(botT) >= 2) && getCount(topT) > IDEAL_MIN) {
        sugg.push({fromId: topT.id, toId: botT.id, fromName: topT.tableName, toName: botT.tableName, fc: getCount(topT), tc: getCount(botT)});
        i++; j++;
      } else { break; }
    }
  }

  document.getElementById('suggestions').innerHTML=sugg.length
    ?sugg.map(s=>`<div class="move-row"><span>⚠️ Balance Directive: 1 player from <b>Table ${s.fromName}</b> → <b>Table ${s.toName}</b></span><button class="exec-btn" onclick="executeMove(${s.fromId},${s.toId})">Execute</button></div>`).join('')
    :(getTotal() === 0 ? '<div class="info-box" style="color:var(--text-muted)">Floor empty. Equilibrium active.</div>' : '<div class="info-box">✓ Variance optimal. Floor in perfect equilibrium.</div>');
    
  const brk=scoringTables.filter(t=>getCount(t)<=3);
  const bw=document.getElementById('break-wrap');
  if(brk.length){
    bw.style.display='block';
    document.getElementById('break-list').innerHTML=brk.map(t=>`<div class="move-row"><span>🚨 <b>Table ${t.tableName}</b> Short Roster Vulnerability (${getCount(t)} players)</span><button class="break-btn" onclick="breakTable(${t.id});renderBalance()">Collapse Ring</button></div>`).join('');
  } else { bw.style.display='none'; }
}

function populateSelect(){
  const sel=document.getElementById('detail-sel');
  const activeTables = getActive();
  sel.innerHTML=activeTables.map(t=>`<option value="${t.id}">Configure Table ${t.tableName} (${getCount(t)} Players)</option>`).join('');
  if(selectedTable && activeTables.find(t => t.id === selectedTable)) sel.value=selectedTable;
}

function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['overview','detail','balance'][i]===name));
  ['overview','detail','balance'].forEach(n=>document.getElementById('panel-'+n).classList.toggle('active',n===name));
  if(name==='balance') renderBalance();
  if(name==='detail'){populateSelect(); if(selectedTable) showDetail(selectedTable);}
}

function bootstrap(){
  initTables(); 
  document.getElementById('floor-input').value = activeFloorSize;
  document.getElementById('seats-input').value = globalMaxPlayers;
  renderGrid(); 
}
bootstrap();
</script>
</body>
