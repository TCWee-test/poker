<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tournament Matrix v2.6.9</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root { --bg: #0a0e17; --card: #121826; --accent: #eab308; --text: #f1f5f9; --muted: #64748b; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; background: var(--bg); color: var(--text); padding: 10px; font-size: 14px; }
.container { max-width: 900px; margin: 0 auto; }

/* 优化后的卡片日志系统 CSS */
.log-stream { display: flex; flex-direction: column; gap: 12px; height: 400px; overflow-y: auto; padding-right: 5px; }
.log-line { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; border-left: 4px solid var(--muted); }
.log-line.ACTIVATE { border-left-color: #10b981; }
.log-line.BUST { border-left-color: #f87171; }
.log-line.BALANCE { border-left-color: #38bdf8; }
.log-line.BREAK { border-left-color: #fbbf24; }
.log-link { color: var(--accent); text-decoration: underline; cursor: pointer; font-weight: 700; }

/* UI 面板 */
.sync-bar { background: #121826; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
.card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #222; }
.active-btn { background: var(--accent); color: #000; border: none; padding: 8px; border-radius: 5px; font-weight: bold; width: 100%; }
</style>
</head>
<body>
<div class="container">
    <div class="sync-bar">
        <input type="text" id="ch-id" value="1001" style="width:60px; background:#000; color:#fff; border:1px solid #333; padding:5px;">
        <button onclick="initHost()">Host</button>
        <button onclick="initJoin()">Join</button>
        <span id="status">● Standalone</span>
    </div>
    
    <div class="grid" id="grid"></div>
    
    <div class="sec-title">📜 Action Logs</div>
    <div class="log-stream" id="log-stream"></div>
</div>

<script>
let tables = Array.from({length:20}, (_,i)=>({id:i+1, name:i+1, seats:Array(9).fill(false)}));
let identity = "FLOOR-1";

// 渲染日志的逻辑
function writeLog(text, type = 'GENERAL') {
    const stream = document.getElementById('log-stream');
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    // 自动高亮桌台链接
    const html = text.replace(/Table (\d+)/gi, '<span class="log-link" onclick="highlightTable($1)">Table $1</span>');
    
    const div = document.createElement('div');
    div.className = `log-line ${type}`;
    div.innerHTML = `<span style="font-size:10px; color:var(--muted)">${time}</span><div style="margin-top:4px">${html}</div>`;
    stream.insertBefore(div, stream.firstChild);
}

function highlightTable(tid) {
    alert("Navigating to Table " + tid); // 这里对接你的页面跳转逻辑
}

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = tables.map(t => `
        <div class="card">
            <div style="font-size:12px; color:var(--muted)">TABLE ${t.name}</div>
            <div style="font-size:20px; font-weight:bold; margin:10px 0;">${t.seats.filter(s=>s).length}</div>
            <button class="active-btn" onclick="toggleSeat(${t.id})">Toggle</button>
        </div>
    `).join('');
}

function toggleSeat(tid) {
    const t = tables.find(x => x.id === tid);
    t.seats[0] = !t.seats[0]; // 示例逻辑
    renderGrid();
    writeLog(`${identity} changed ${t.seats[0] ? 'Status Active' : 'Status Busted'} on Table ${t.name}`, t.seats[0] ? 'ACTIVATE' : 'BUST');
}

function initHost() { document.getElementById('status').textContent = "● Hosting Room"; renderGrid(); }
function initJoin() { document.getElementById('status').textContent = "● Connected"; renderGrid(); }

renderGrid();
</script>
</body>
</html>
